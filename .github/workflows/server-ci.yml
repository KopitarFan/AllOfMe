name: Server CI

on:
  push:
    branches:
      - main
    paths:
      - server/**
      - .github/workflows/server-ci.yml
  pull_request:
    branches:
      - main
    paths:
      - server/**
      - .github/workflows/server-ci.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: server

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.3
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: server/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Build server
        run: pnpm build

      - name: Build Docker image
        run: docker build -t all-of-me-server:ci .
