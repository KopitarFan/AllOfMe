services:
  api:
    image: ${ALLOFME_SERVER_IMAGE}
    container_name: allofme-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ALLOFME_SERVER_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      CLOUD_SAVE_MAX_PAYLOAD_BYTES: ${CLOUD_SAVE_MAX_PAYLOAD_BYTES:-10485760}
      CLOUD_SAVE_MAX_VERSIONS: ${CLOUD_SAVE_MAX_VERSIONS:-5}
      DEVICE_LINK_CODE_TTL_MS: ${DEVICE_LINK_CODE_TTL_MS:-600000}
      CLOUD_SAVE_STORE: local
      CLOUD_SAVE_DATA_DIR: /app/data/cloud-saves
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
      RATE_LIMIT_TIME_WINDOW_MS: ${RATE_LIMIT_TIME_WINDOW_MS:-60000}
      RATE_LIMIT_REGISTRATION_MAX: ${RATE_LIMIT_REGISTRATION_MAX:-5}
      RATE_LIMIT_REGISTRATION_TIME_WINDOW_MS: ${RATE_LIMIT_REGISTRATION_TIME_WINDOW_MS:-900000}
      RATE_LIMIT_SAVE_MAX: ${RATE_LIMIT_SAVE_MAX:-30}
      RATE_LIMIT_SAVE_TIME_WINDOW_MS: ${RATE_LIMIT_SAVE_TIME_WINDOW_MS:-60000}
    volumes:
      - ${ALLOFME_DATA_DIR:-/opt/allofme/cloud-saves}:/app/data/cloud-saves
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
