services:
  api:
    image: ${ALLOFME_SERVER_IMAGE}
    container_name: allofme-server
    restart: unless-stopped
    ports:
      - "${ALLOFME_SERVER_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CLOUD_SAVE_MAX_PAYLOAD_BYTES: ${CLOUD_SAVE_MAX_PAYLOAD_BYTES:-10485760}
      CLOUD_SAVE_MAX_VERSIONS: ${CLOUD_SAVE_MAX_VERSIONS:-5}
      CLOUD_SAVE_STORE: local
      CLOUD_SAVE_DATA_DIR: /app/data/cloud-saves
    volumes:
      - ${ALLOFME_DATA_DIR:-/opt/allofme/cloud-saves}:/app/data/cloud-saves
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/healthz').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
